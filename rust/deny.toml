# Keep the Lambda on the modern rustls 0.23 stack. The bans below fail if the
# legacy rustls 0.21 / rustls-webpki 0.101 / sct chain returns.

[graph]
# Audit only Lambda Linux targets; this avoids noise from other-platform crates
# that are present in the lock graph but never compiled for the provider.
targets = [
  { triple = "aarch64-unknown-linux-gnu" },
  { triple = "x86_64-unknown-linux-gnu" },
]
all-features = false

[advisories]
# Fail on any RustSec advisory affecting the dependency graph.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
unmaintained = "workspace"
# Add documented suppressions only when a fix is genuinely unavailable.
ignore = []

# `pnpm rust:deny` excludes only `spin@0.10.0`: current released
# aws-smithy-checksums requires crc-fast 1.9+, whose x86_64/aarch64 targets
# require that newly yanked exact version. `pnpm rust:audit` still scans the
# complete lockfile. Remove the exact CLI exclusion when crc-fast publishes a
# compatible non-yanked dependency.

[bans]
# AWS SDK transitive dependencies carry a few duplicate majors. Warn for
# visibility without failing CI on upstream churn.
multiple-versions = "warn"
wildcards = "allow"

# Hard-deny the legacy TLS chain so it cannot silently regress.
deny = [
  { crate = "rustls:<0.23", reason = "Legacy rustls (0.21.x) carried RUSTSEC-2026-0104-affected rustls-webpki 0.101 and sct; the handler must stay on rustls 0.23 (aws-lc-rs)." },
  { crate = "rustls-webpki:<0.102", reason = "rustls-webpki 0.101.7 is the RUSTSEC-2026-0104 target; only the 0.103 line is permitted." },
  { crate = "sct", reason = "sct was folded into rustls-webpki; its presence means the legacy rustls 0.21 stack has returned." },
  { crate = "hyper:0.14", reason = "hyper 0.14 only appeared via the legacy hyper-rustls 0.24 TLS chain; the handler uses hyper 1.x." },
]

[licenses]
# Current dependencies are permissive. New copyleft or unknown licenses fail the
# build for review. Some allowed licenses are target-filtered today but kept here
# to avoid noisy failures if dependency targets shift.
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.9
# Some allowed licenses are absent from the target-filtered graph by design.
unused-allowed-license = "allow"
# The handler crate already declares `license = "MIT"`.
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
