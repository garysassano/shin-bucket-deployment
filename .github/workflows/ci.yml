name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Required checks
    permissions:
      contents: read
    uses: ./.github/workflows/checks.yml
