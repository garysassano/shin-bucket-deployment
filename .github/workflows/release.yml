name: Release

# Publishing is tag-only. Manual runs execute the complete release path through
# an npm dry run without requesting an OIDC token.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Validate release ref
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag, version, and main ancestry
        if: ${{ github.event_name == 'push' }}
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  checks:
    name: Complete release gates
    needs: preflight
    permissions:
      contents: read
    uses: ./.github/workflows/checks.yml

  package:
    name: Create verified release artifact
    needs: [preflight, checks]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download arm64 bootstrap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bootstrap-arm64
          path: assets/bootstrap-arm64

      - name: Download x86_64 bootstrap
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bootstrap-x86_64
          path: assets/bootstrap-x86_64

      - name: Build, pack, and verify the publish artifact
        run: |
          pnpm run verify:package -- --pack-destination "$RUNNER_TEMP/npm-pack"
          tarballs=("$RUNNER_TEMP"/npm-pack/*.tgz)
          test "${#tarballs[@]}" -eq 1
          tarball="${tarballs[0]}"
          cd "$(dirname "$tarball")"
          sha256sum "$(basename "$tarball")" >"$(basename "$tarball").sha256"

      - name: Upload exact release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-package
          path: |
            ${{ runner.temp }}/npm-pack/*.tgz
            ${{ runner.temp }}/npm-pack/*.sha256
          if-no-files-found: error
          retention-days: 7

  dry-run:
    name: npm publish dry run
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download exact release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package
          path: ${{ runner.temp }}/release-package

      - name: Publish dry run
        run: |
          tarballs=("$RUNNER_TEMP"/release-package/*.tgz)
          test "${#tarballs[@]}" -eq 1
          # npm otherwise rejects a rehearsal when package.json still names the
          # current published version. This job has no OIDC token or npm auth.
          npm publish "${tarballs[0]}" --dry-run --force

  publish:
    name: Publish to npm
    if: ${{ github.event_name == 'push' }}
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download exact release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package
          path: ${{ runner.temp }}/release-package

      - name: Publish or verify an idempotent rerun
        run: |
          tarballs=("$RUNNER_TEMP"/release-package/*.tgz)
          test "${#tarballs[@]}" -eq 1
          node scripts/publish-package.mjs --tarball "${tarballs[0]}"

  github-release:
    name: Create GitHub release
    if: ${{ github.event_name == 'push' }}
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download exact release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-package
          path: ${{ runner.temp }}/release-package

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi
          gh release upload "$GITHUB_REF_NAME" "$RUNNER_TEMP"/release-package/* --clobber
