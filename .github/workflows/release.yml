name: Release

# Publishes the construct to npm with prebuilt Rust provider binaries baked in.
# Triggered by pushing a semver tag (e.g. v0.1.0) or manually via workflow_dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and pack only; do not publish to npm"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # Cross-compile the Rust provider once per architecture and upload the
  # bootstrap binaries as artifacts for the publish job to assemble.
  build-bootstrap:
    name: Build bootstrap (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-unknown-linux-gnu
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise
      MISE_RUSTUP_HOME: ${{ github.workspace }}/.mise/rustup
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain and tools
        uses: jdx/mise-action@v4
        with:
          cache: true
          mise_toml: |
            [tools]
            zig = "0.16.0"
            rust = { version = "stable", targets = "${{ matrix.target }}" }
            cargo-binstall = "latest"
            "cargo:cargo-lambda" = "1.9.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-targets: true
          cache-workspace-crates: true
          cache-all-crates: false
          cache-bin: false
          key: bootstrap-${{ matrix.target }}

      - name: Build bootstrap
        run: node scripts/build-bootstrap.mjs ${{ matrix.arch }}

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-${{ matrix.arch }}
          path: assets/bootstrap-${{ matrix.arch }}/bootstrap
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build-bootstrap
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + automatic provenance
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download arm64 bootstrap
        uses: actions/download-artifact@v8
        with:
          name: bootstrap-arm64
          path: assets/bootstrap-arm64

      - name: Download x86_64 bootstrap
        uses: actions/download-artifact@v8
        with:
          name: bootstrap-x86_64
          path: assets/bootstrap-x86_64

      - name: Verify bootstrap binaries are present
        run: |
          chmod 755 assets/bootstrap-arm64/bootstrap assets/bootstrap-x86_64/bootstrap
          test -f assets/bootstrap-arm64/bootstrap
          test -f assets/bootstrap-x86_64/bootstrap
          test -x assets/bootstrap-arm64/bootstrap
          test -x assets/bootstrap-x86_64/bootstrap

      - name: Verify tag matches package version
        if: ${{ github.event_name == 'push' }}
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Verify package
        run: pnpm verify:package

      - name: Build package
        run: pnpm build:package

      - name: Pack
        run: |
          mkdir -p /tmp/npm-pack
          pnpm pack --pack-destination /tmp/npm-pack
          echo "TARBALL=$(ls /tmp/npm-pack/*.tgz)" >> "$GITHUB_ENV"

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}
        run: npm publish "$TARBALL" --dry-run

      - name: Publish
        if: ${{ github.event_name == 'push' || !inputs.dry-run }}
        # OIDC trusted publishing: npm authenticates via the id-token (no NPM_TOKEN),
        # and provenance is generated automatically for a public repo + package.
        run: npm publish "$TARBALL" --access public

  # Create a GitHub Release for the tag after a successful npm publish.
  # Only runs on tag pushes (workflow_dispatch has no release tag to target).
  github-release:
    name: Create GitHub release
    needs: publish
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
