name: Release

# Publishes the construct to npm with prebuilt Rust provider binaries baked in.
# Publishing is tag-only. Manual runs build and verify the package as a dry run.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Validate release ref
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate tag, version, and main ancestry
        if: ${{ github.event_name == 'push' }}
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  # Cross-compile the Rust provider once per architecture and upload the
  # bootstrap archives as artifacts for the publish job to assemble.
  build-bootstrap:
    name: Build bootstrap (${{ matrix.arch }})
    needs: preflight
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-unknown-linux-gnu
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
    env:
      MISE_DATA_DIR: ${{ github.workspace }}/.mise
      MISE_RUSTUP_HOME: ${{ github.workspace }}/.mise/rustup
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust toolchain and tools
        uses: jdx/mise-action@v4
        with:
          cache: true
          mise_toml: |
            [tools]
            zig = "0.16.0"
            rust = { version = "stable", targets = "${{ matrix.target }}" }
            cargo-binstall = "latest"
            "cargo:cargo-lambda" = "1.9.1"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-targets: true
          cache-workspace-crates: true
          cache-all-crates: false
          cache-bin: false
          key: bootstrap-${{ matrix.target }}

      - name: Build bootstrap
        run: node scripts/build-bootstrap.mjs ${{ matrix.arch }}

      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-${{ matrix.arch }}
          path: assets/bootstrap-${{ matrix.arch }}/bootstrap.zip
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: [preflight, build-bootstrap]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + automatic provenance
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download arm64 bootstrap
        uses: actions/download-artifact@v8
        with:
          name: bootstrap-arm64
          path: assets/bootstrap-arm64

      - name: Download x86_64 bootstrap
        uses: actions/download-artifact@v8
        with:
          name: bootstrap-x86_64
          path: assets/bootstrap-x86_64

      - name: Verify bootstrap binaries are present
        run: |
          test -f assets/bootstrap-arm64/bootstrap.zip
          test -f assets/bootstrap-x86_64/bootstrap.zip

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build, pack, and verify the publish artifact
        run: |
          pnpm run verify:package -- --pack-destination "$RUNNER_TEMP/npm-pack"
          tarballs=("$RUNNER_TEMP"/npm-pack/*.tgz)
          test "${#tarballs[@]}" -eq 1
          echo "TARBALL=${tarballs[0]}" >> "$GITHUB_ENV"

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm publish "$TARBALL" --dry-run

      - name: Publish
        if: ${{ github.event_name == 'push' }}
        # OIDC trusted publishing: npm authenticates via the id-token (no NPM_TOKEN),
        # and provenance is generated automatically for a public repo + package.
        run: npm publish "$TARBALL" --access public --provenance

  # Create a GitHub Release for the tag after a successful npm publish.
  # Only runs on tag pushes (workflow_dispatch has no release tag to target).
  github-release:
    name: Create GitHub release
    needs: publish
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v7

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
