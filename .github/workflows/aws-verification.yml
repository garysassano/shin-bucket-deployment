name: AWS Verification
run-name: AWS verification for ${{ inputs.source_ref }}

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Exact 40-character commit to verify
        required: true
        default: main
        type: string

concurrency:
  group: aws-test-account
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: eu-central-1
  AWS_DEFAULT_REGION: eu-central-1

jobs:
  bootstrap:
    name: Build provider
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      MISE_DATA_DIR: /tmp/shin-mise
      MISE_RUSTUP_HOME: /tmp/shin-mise/rustup
      CARGO_TARGET_DIR: /tmp/shin-cargo-target
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}
          persist-credentials: false

      - name: Validate source commit
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          [[ "$SOURCE_REF" =~ ^[0-9a-f]{40}$ ]]
          test "$(git rev-parse HEAD)" = "$SOURCE_REF"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Setup provider toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          cache: true
          install_args: rust zig cargo:cargo-lambda

      - name: Install Rust target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: rust -> target
          cache-targets: true
          cache-workspace-crates: true
          cache-all-crates: false
          cache-bin: false
          key: aws-verification-arm64

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build arm64 provider
        run: node scripts/build-bootstrap.mjs arm64

      - name: Upload provider
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aws-verification-bootstrap-${{ github.run_id }}
          path: |
            assets/bootstrap-arm64/bootstrap.zip
            assets/bootstrap-arm64/build-provenance.json
          if-no-files-found: error
          retention-days: 1

  verify:
    name: Verify ${{ matrix.group }}
    needs: bootstrap
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: aws-tests
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - group: simple
            scenarios: simple
            cleanup: simple
          - group: root-prefix
            scenarios: root-prefix
            cleanup: root-prefix
          - group: marker-replacement
            scenarios: marker-replacement
            cleanup: marker-replacement
          - group: filters
            scenarios: filters
            cleanup: filters
          - group: source-overwrite-order
            scenarios: source-overwrite-order
            cleanup: source-overwrite-order
          - group: external-zips
            scenarios: external-zips
            cleanup: external-zips
          - group: co-tenant-protection
            scenarios: co-tenant-protection-initial co-tenant-protection-updated
            cleanup: co-tenant-protection-updated
          - group: child-parent-retention
            scenarios: child-parent-retention-initial child-parent-retention-updated
            cleanup: child-parent-retention-updated
          - group: child-parent-cleanup
            scenarios: child-parent-cleanup-initial child-parent-cleanup-updated
            cleanup: child-parent-cleanup-updated
          - group: cross-bucket-change
            scenarios: cross-bucket-change-initial cross-bucket-change-updated
            cleanup: cross-bucket-change-updated
          - group: stale-object-cleanup
            scenarios: stale-object-cleanup-initial stale-object-cleanup-updated
            cleanup: stale-object-cleanup-updated
          - group: stale-object-retention
            scenarios: stale-object-retention-initial stale-object-retention-updated
            cleanup: stale-object-retention-updated
          - group: default-retention
            scenarios: default-retention-initial default-retention-updated
            cleanup: default-retention-updated
          - group: extract-false
            scenarios: extract-false
            cleanup: extract-false
          - group: object-deletion
            scenarios: object-deletion-initial object-deletion-updated object-deletion-bucket-only
            cleanup: object-deletion-bucket-only
          - group: replacement-safety
            scenarios: replacement-safety-initial replacement-safety-updated
            cleanup: replacement-safety-updated
          - group: large-archive
            scenarios: large-archive
            cleanup: large-archive
          - group: kms-destination
            scenarios: kms-destination
            cleanup: kms-destination
          - group: kms-managed-destination
            scenarios: kms-managed-destination
            cleanup: kms-managed-destination
          - group: dsse-managed-destination
            scenarios: dsse-managed-destination
            cleanup: dsse-managed-destination
          - group: handler-isolation
            scenarios: handler-isolation
            cleanup: handler-isolation
          - group: cloudfront-sync
            scenarios: cloudfront-sync
            cleanup: cloudfront-sync
          - group: cloudfront-async
            scenarios: cloudfront-async
            cleanup: cloudfront-async
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_ref }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download provider
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aws-verification-bootstrap-${{ github.run_id }}
          path: assets/bootstrap-arm64

      - name: Build scenario applications
        run: pnpm build

      - name: Configure AWS credentials
        id: aws-credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ vars.AWS_TEST_ROLE_ARN }}
          role-session-name: shin-${{ github.run_id }}-${{ matrix.group }}
          role-duration-seconds: 21600
          mask-aws-account-id: true
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy and verify group
        env:
          VERIFY_GROUP: ${{ matrix.group }}
          VERIFY_SCENARIOS: ${{ matrix.scenarios }}
        run: |
          for scenario in $VERIFY_SCENARIOS; do
            if ! node dist/scenarios/runner.js verify deploy "$scenario" >"$RUNNER_TEMP/verify-$scenario.log" 2>&1; then
              echo "::error::AWS verification failed for group $VERIFY_GROUP"
              exit 1
            fi
          done
          echo "AWS verification passed for group $VERIFY_GROUP"

      - name: Destroy group
        if: ${{ always() && steps.aws-credentials.outcome == 'success' }}
        env:
          CLEANUP_SCENARIO: ${{ matrix.cleanup }}
          VERIFY_GROUP: ${{ matrix.group }}
        run: |
          if ! node dist/scenarios/runner.js verify destroy "$CLEANUP_SCENARIO" >"$RUNNER_TEMP/verify-destroy.log" 2>&1; then
            echo "::error::AWS cleanup failed for group $VERIFY_GROUP"
            exit 1
          fi
          echo "AWS cleanup passed for group $VERIFY_GROUP"
