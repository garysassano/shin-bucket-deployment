<rect x="180" y="418" width="540" height="8" rx="4" fill="#12202c"/>
<rect x="180" y="418" width="224" height="8" rx="4" fill="url(#shin)"/>
<rect x="180" y="432" width="540" height="8" rx="4" fill="#12202c"/>
